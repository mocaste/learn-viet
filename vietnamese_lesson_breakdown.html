<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0f;
    color: #e8e2d4;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: #f5c842;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .subtitle {
    text-align: center;
    font-size: 0.78rem;
    color: #888;
    margin-bottom: 24px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: #aaa;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .sentence-card {
    background: #17171a;
    border: 1px solid #2a2a2e;
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .sentence-card:hover { border-color: #f5c842; }

  .sentence-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .sentence-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: #f5c842;
    background: #2a2400;
    border: 1px solid #f5c84244;
    border-radius: 4px;
    padding: 2px 7px;
    white-space: nowrap;
    margin-top: 2px;
  }

  .sentence-texts {
    flex: 1;
  }

  .sentence-viet {
    font-size: 1.05rem;
    font-weight: 600;
    color: #f0e8d0;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .sentence-ro {
    font-size: 0.82rem;
    color: #7db5f0;
    font-style: italic;
  }

  .toggle-icon {
    font-size: 1.1rem;
    color: #555;
    transition: transform 0.25s;
    margin-top: 2px;
  }
  .sentence-card.open .toggle-icon { transform: rotate(180deg); color: #f5c842; }

  .word-grid {
    display: none;
    padding: 0 18px 18px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sentence-card.open .word-grid { display: flex; }

  .word-chip {
    background: #1e1e22;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 90px;
    max-width: 160px;
    text-align: center;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .word-chip:hover {
    transform: translateY(-2px);
    border-color: #f5c842;
  }

  .chip-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    color: #888;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .chip-viet {
    font-size: 1rem;
    font-weight: 600;
    color: #f5e8a0;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .chip-phon {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: #a8d4b0;
    margin-bottom: 5px;
  }

  .chip-ro {
    font-size: 0.78rem;
    color: #7db5f0;
    font-style: italic;
  }

  /* color by type */
  .chip-noun .chip-viet { color: #f5b8a0; }
  .chip-verb .chip-viet { color: #a0d4f5; }
  .chip-name .chip-viet { color: #f5c842; }
  .chip-particle .chip-viet { color: #c8a0f5; }
  .chip-adj .chip-viet { color: #a0f5b8; }
  .chip-num .chip-viet { color: #f5e0a0; }

  .chip-noun .chip-type { color: #f5b8a066; }
  .chip-verb .chip-type { color: #a0d4f566; }
  .chip-name .chip-type { color: #f5c84266; }
  .chip-particle .chip-type { color: #c8a0f566; }
  .chip-adj .chip-type { color: #a0f5b866; }
  .chip-num .chip-type { color: #f5e0a066; }
</style>
</head>
<body>

<h1>🇻🇳 Lecție de Vietnameză</h1>
<p class="subtitle">click pe fiecare frază pentru breakdown cuvânt cu cuvânt</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f5b8a0"></div> substantiv</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a0d4f5"></div> verb</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f5c842"></div> nume propriu</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c8a0f5"></div> particulă / pronume</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a0f5b8"></div> adjectiv / adverb</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f5e0a0"></div> număr</div>
</div>

<div id="sentences"></div>

<script>
const data = [
  {
    viet: "Bạn tôi tên là Linda.",
    ro: "Prietena mea se numește Linda.",
    words: [
      { v:"Bạn", ph:"ban↓", ro:"prieten/ă", type:"noun" },
      { v:"tôi", ph:"toi", ro:"eu / meu", type:"particle" },
      { v:"tên", ph:"ten", ro:"nume", type:"noun" },
      { v:"là", ph:"la", ro:"este (a fi)", type:"verb" },
      { v:"Linda", ph:"Lin-da", ro:"Linda", type:"name" }
    ]
  },
  {
    viet: "Linda là người Mỹ gốc Việt.",
    ro: "Linda este americancă de origine vietnameză.",
    words: [
      { v:"Linda", ph:"Lin-da", ro:"Linda", type:"name" },
      { v:"là", ph:"la", ro:"este", type:"verb" },
      { v:"người", ph:"nguoi", ro:"persoană / om", type:"noun" },
      { v:"Mỹ", ph:"mi↑", ro:"America / american", type:"name" },
      { v:"gốc", ph:"goc↑", ro:"origine / rădăcină", type:"noun" },
      { v:"Việt", ph:"viet↓", ro:"vietnamez", type:"adj" }
    ]
  },
  {
    viet: "Năm nay Linda 18 tuổi.",
    ro: "Anul acesta Linda are 18 ani.",
    words: [
      { v:"Năm", ph:"nam", ro:"an", type:"noun" },
      { v:"nay", ph:"nai", ro:"acesta / ăsta", type:"particle" },
      { v:"Linda", ph:"Lin-da", ro:"Linda", type:"name" },
      { v:"18", ph:"muoi↓ tam", ro:"optsprezece", type:"num" },
      { v:"tuổi", ph:"tuoi↓", ro:"ani (vârstă)", type:"noun" }
    ]
  },
  {
    viet: "Linda đang học tiếng Việt ở Hà Nội.",
    ro: "Linda învață în prezent vietnameza la Hanoi.",
    words: [
      { v:"Linda", ph:"Lin-da", ro:"Linda", type:"name" },
      { v:"đang", ph:"dang", ro:"acum / în prezent", type:"particle" },
      { v:"học", ph:"hoc↓", ro:"a învăța", type:"verb" },
      { v:"tiếng", ph:"tieng↓", ro:"limbă", type:"noun" },
      { v:"Việt", ph:"viet↓", ro:"vietnameză", type:"name" },
      { v:"ở", ph:"uh↓", ro:"la / în (loc)", type:"particle" },
      { v:"Hà Nội", ph:"Ha Noi↓", ro:"Hanoi", type:"name" }
    ]
  },
  {
    viet: "Cô giáo tiếng Việt của Linda tên là Thu.",
    ro: "Profesoara de vietnameză a Lindei se numește Thu.",
    words: [
      { v:"Cô", ph:"co", ro:"doamnă / ea (tânără)", type:"particle" },
      { v:"giáo", ph:"ziao", ro:"profesor", type:"noun" },
      { v:"tiếng", ph:"tieng↓", ro:"limbă", type:"noun" },
      { v:"Việt", ph:"viet↓", ro:"vietnameză", type:"name" },
      { v:"của", ph:"cua↓", ro:"al / a (posesiv)", type:"particle" },
      { v:"Linda", ph:"Lin-da", ro:"Linda", type:"name" },
      { v:"tên", ph:"ten", ro:"nume", type:"noun" },
      { v:"là", ph:"la", ro:"este", type:"verb" },
      { v:"Thu", ph:"tu", ro:"Thu", type:"name" }
    ]
  },
  {
    viet: "Cô Thu là người Hà Nội.",
    ro: "Doamna Thu este din Hanoi.",
    words: [
      { v:"Cô", ph:"co", ro:"doamnă (titlu)", type:"particle" },
      { v:"Thu", ph:"tu", ro:"Thu", type:"name" },
      { v:"là", ph:"la", ro:"este", type:"verb" },
      { v:"người", ph:"nguoi", ro:"persoană / locuitor", type:"noun" },
      { v:"Hà Nội", ph:"Ha Noi↓", ro:"Hanoi", type:"name" }
    ]
  },
  {
    viet: "Cô ấy khoảng 25 tuổi.",
    ro: "Ea are aproximativ 25 de ani.",
    words: [
      { v:"Cô", ph:"co", ro:"ea (tânără)", type:"particle" },
      { v:"ấy", ph:"ay↓", ro:"aceea / acel", type:"particle" },
      { v:"khoảng", ph:"khwang↓", ro:"aproximativ", type:"adj" },
      { v:"25", ph:"hai muoi↓ lam↓", ro:"douăzeci și cinci", type:"num" },
      { v:"tuổi", ph:"tuoi↓", ro:"ani (vârstă)", type:"noun" }
    ]
  },
  {
    viet: "Lớp tiếng Việt của Linda có 20 sinh viên.",
    ro: "Clasa de vietnameză a Lindei are 20 de studenți.",
    words: [
      { v:"Lớp", ph:"lop↓", ro:"clasă", type:"noun" },
      { v:"tiếng", ph:"tieng↓", ro:"limbă", type:"noun" },
      { v:"Việt", ph:"viet↓", ro:"vietnameză", type:"name" },
      { v:"của", ph:"cua↓", ro:"al / a (posesiv)", type:"particle" },
      { v:"Linda", ph:"Lin-da", ro:"Linda", type:"name" },
      { v:"có", ph:"co↑", ro:"are / există", type:"verb" },
      { v:"20", ph:"hai muoi↓", ro:"douăzeci", type:"num" },
      { v:"sinh viên", ph:"sin↓ vien", ro:"student/ă", type:"noun" }
    ]
  },
  {
    viet: "Họ là người Mỹ, Canada, Hàn Quốc và Thái Lan.",
    ro: "Ei sunt din America, Canada, Coreea de Sud și Thailanda.",
    words: [
      { v:"Họ", ph:"ho↓", ro:"ei / ele", type:"particle" },
      { v:"là", ph:"la", ro:"sunt", type:"verb" },
      { v:"người", ph:"nguoi", ro:"oameni din", type:"noun" },
      { v:"Mỹ", ph:"mi↑", ro:"America", type:"name" },
      { v:"Canada", ph:"Ca-na-da", ro:"Canada", type:"name" },
      { v:"Hàn Quốc", ph:"Han↓ Cuoc↑", ro:"Coreea de Sud", type:"name" },
      { v:"và", ph:"va", ro:"și", type:"particle" },
      { v:"Thái Lan", ph:"Thai↑ Lan", ro:"Thailanda", type:"name" }
    ]
  },
  {
    viet: "Họ đều rất thích học tiếng Việt.",
    ro: "Tuturor le place foarte mult să învețe vietnameza.",
    words: [
      { v:"Họ", ph:"ho↓", ro:"ei / ele", type:"particle" },
      { v:"đều", ph:"deu", ro:"toți / cu toții", type:"adj" },
      { v:"rất", ph:"rat↓", ro:"foarte", type:"adj" },
      { v:"thích", ph:"tick↓", ro:"a plăcea", type:"verb" },
      { v:"học", ph:"hoc↓", ro:"a învăța", type:"verb" },
      { v:"tiếng", ph:"tieng↓", ro:"limbă", type:"noun" },
      { v:"Việt", ph:"viet↓", ro:"vietnameză", type:"name" }
    ]
  }
];

const typeLabel = {
  noun: "substantiv",
  verb: "verb",
  name: "nume propriu",
  particle: "particulă",
  adj: "adj / adv",
  num: "număr"
};

const container = document.getElementById('sentences');

data.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'sentence-card';

  const wordsHTML = s.words.map(w => `
    <div class="word-chip chip-${w.type}">
      <div class="chip-type">${typeLabel[w.type]}</div>
      <div class="chip-viet">${w.v}</div>
      <div class="chip-phon">[${w.ph}]</div>
      <div class="chip-ro">${w.ro}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="sentence-header">
      <span class="sentence-num">#${i+1}</span>
      <div class="sentence-texts">
        <div class="sentence-viet">${s.viet}</div>
        <div class="sentence-ro">${s.ro}</div>
      </div>
      <span class="toggle-icon">▾</span>
    </div>
    <div class="word-grid">${wordsHTML}</div>
  `;

  card.querySelector('.sentence-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  container.appendChild(card);
});
</script>
</body>
</html>
